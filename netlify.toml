# Netlify configuration for Personal Command Center
# The official Next.js runtime turns app/api route handlers into Functions automatically.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# --- Scheduled functions ---------------------------------------------------
# generate-daily-briefing is committed but its schedule is intentionally
# DISABLED in Phase 1. To enable later, uncomment the block below.
# Cron is in UTC. "0 11 * * *" = 11:00 UTC daily (~6-7am US Eastern).
#
# [functions."generate-daily-briefing"]
#   schedule = "0 11 * * *"
#
# Finance 1B.3B webhook processors (schedules declared IN-CODE via `config`):
#   • process-plaid-webhooks-background.mts — Netlify BACKGROUND Function (active
#     primary processor; HTTP-triggered by the webhook route; ~15-min, auto-retry).
#   • drain-plaid-webhooks.mts — scheduled recovery BACKSTOP (active; every 10 min
#     via `export const config = { schedule }` — catches events the background
#     invocation missed; atomic claims prevent double-processing).

[functions]
  # .mts scheduled + background functions live here
  directory = "netlify/functions"
